<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raj Karan Sah — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="greetingBar"></div>

  <!-- HEADER COMPONENT -->
  <div id="header-container"></div>

  <!-- HERO COMPONENT -->
  <div id="hero-container"></div>

  <!-- DIVIDER -->
  <div class="divider"><hr></div>

  <!-- EDUCATION COMPONENT -->
  <div id="education-container"></div>

  <!-- DIVIDER -->
  <div class="divider"><hr></div>

  <!-- PROJECTS COMPONENT -->
  <div id="projects-container"></div>

  <!-- DIVIDER -->
  <div class="divider"><hr></div>

  <!-- SKILLS COMPONENT -->
  <div id="skills-container"></div>

  <!-- DIVIDER -->
  <div class="divider"><hr></div>

  <!-- CONTACT COMPONENT -->
  <div id="contact-container"></div>

  <!-- DIVIDER -->
  <div class="divider"><hr></div>

  <!-- FOOTER COMPONENT -->
  <div id="footer-container"></div>

  <!-- Load Components -->
  <script>
    // Function to load HTML component
    async function loadComponent(componentPath, containerId) {
      try {
        const response = await fetch(componentPath);
        const html = await response.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (error) {
        console.error(`Error loading ${componentPath}:`, error);
      }
    }

    // Load all components
    Promise.all([
      loadComponent('components/header.html', 'header-container'),
      loadComponent('components/hero.html', 'hero-container'),
      loadComponent('components/education.html', 'education-container'),
      loadComponent('components/projects.html', 'projects-container'),
      loadComponent('components/skills.html', 'skills-container'),
      loadComponent('components/contact.html', 'contact-container'),
      loadComponent('components/footer.html', 'footer-container')
    ]).then(() => {
      // Initialize scripts after all components are loaded
      initializeScripts();
    });

    function initializeScripts() {
      // Greeting
      function setGreeting() {
        const h = new Date().getHours();
        let g = h < 12 ? "Good Morning! Welcome to my profile"
              : h < 18 ? "Good Afternoon! Welcome to my profile"
              : h < 21 ? "Good Evening! Welcome to my profile"
              : "Good Night! Thanks for visiting";
        document.getElementById("greetingBar").innerText = g;
      }
      setGreeting();

      // Scroll reveal - immediately show elements already in viewport
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });

      document.querySelectorAll('.reveal').forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight) {
          el.classList.add('visible');
        } else {
          observer.observe(el);
        }
      });
    }
  </script>

</body>
</html>
